<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capacity Health — Fleet + Team Views</title>
<style>
  :root{
    --bg:#0A1120; --panel:#101B31; --panel2:#0D1729; --line:#1E2C48;
    --ink:#EAF1FC; --mute:#7E93B8; --faint:#4E6187;
    --blue:#0080FF; --blue-dim:#0a3a6b;
    --red:#E24B4A; --amber:#EF9F27; --green:#1D9E75;
    --red-bg:#2a1414; --amber-bg:#2a2010; --green-bg:#0f2620;
    --mono:'SF Mono',"SFMono-Regular",Menlo,Consolas,"Liberation Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.4}
  /* layout: sidebar + main */
  .app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
  .side{background:var(--panel2);border-right:1px solid var(--line);padding:22px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
  
  /* DigitalOcean Logo Container Styles */
  .side .do-logo-container {
    padding: 0 22px 15px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 20px;
  }
  .side .do-logo-container img {
    width: 130px;
    height: auto;
    display: block;
  }

  .side .logo{display:flex;align-items:center;gap:10px;padding:0 22px 20px}
  .side .logo .d3{display:flex;gap:4px}
  .side .logo .d3 i{width:10px;height:10px;border-radius:50%;display:block}
  .side .logo h1{font-size:13px;font-weight:600;letter-spacing:.01em;line-height:1.2}
  .side .logo .sub{color:var(--faint);font-size:9px;font-family:var(--mono);letter-spacing:.05em;margin-top:2px}
  .navgroup{padding:14px 14px 4px}
  .navgroup .gl{color:var(--faint);font-size:9px;text-transform:uppercase;letter-spacing:.15em;padding:0 8px 8px}
  .nav{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--mute);font-size:13px;transition:background .12s,color .12s;border:1px solid transparent}
  .nav:hover{background:var(--panel);color:var(--ink)}
  .nav.active{background:var(--panel);color:var(--ink);border-color:var(--line)}
  .nav .ic{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
  .nav.active .ic{color:var(--blue)}
  .nav .meta{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--faint)}
  .nav .dotr{width:7px;height:7px;border-radius:50%;background:var(--red);margin-left:auto}

  .main{overflow-x:hidden}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 34px;border-bottom:1px solid var(--line);position:sticky;top:0;background:linear-gradient(180deg,#0C1526,#0A1120);z-index:10}
  .topbar .tt{font-size:17px;font-weight:600}
  .topbar .td{color:var(--mute);font-size:12px;margin-top:1px}
  .topbar .right{display:flex;gap:24px;align-items:center}
  .kv{text-align:right}.kv .l{color:var(--faint);font-size:9px;text-transform:uppercase;letter-spacing:.13em}
  .kv .v{font-family:var(--mono);font-size:12px;margin-top:2px}
  .live{display:flex;align-items:center;gap:6px;color:var(--green);font-size:11px;font-family:var(--mono)}
  .live i{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  .view{padding:26px 34px 60px;display:none}
  .view.active{display:block}
  .illus{display:inline-block;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:3px 9px;color:var(--mute);font-family:var(--mono);font-size:9.5px;letter-spacing:.03em;margin-bottom:18px}

  /* shared bits */
  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:8px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:15px 17px;position:relative}
  .stat .big{font-family:var(--mono);font-size:27px;font-weight:600;line-height:1}
  .stat .lab{color:var(--mute);font-size:10.5px;margin-top:7px}
  .stat .tick{position:absolute;top:15px;right:15px;width:8px;height:8px;border-radius:50%}
  .stat.red .big{color:var(--red)}.stat.red .tick{background:var(--red)}
  .stat.amber .big{color:var(--amber)}.stat.amber .tick{background:var(--amber)}
  .stat.green .big{color:var(--green)}.stat.green .tick{background:var(--green)}
  .stat.blue .big{color:var(--blue)}

  .seclab{display:flex;align-items:baseline;gap:12px;margin:24px 0 13px}
  .seclab h2{font-size:12.5px;font-weight:600;letter-spacing:.02em}
  .seclab .hint{color:var(--faint);font-size:11px;font-family:var(--mono)}
  .legend{margin-left:auto;display:flex;gap:15px}
  .legend span{display:flex;align-items:center;gap:6px;color:var(--mute);font-size:11px}
  .legend i{width:9px;height:9px;border-radius:2px}

  /* leadership board */
  .region{margin-bottom:20px}
  .rhead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .rhead .rn{font-family:var(--mono);font-size:11.5px;color:var(--mute);letter-spacing:.05em}
  .rhead .rl{flex:1;height:1px;background:var(--line)}
  .rhead .rc{font-family:var(--mono);font-size:10.5px;color:var(--faint)}
  .dcgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:11px}
  .dc{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px;cursor:pointer;transition:transform .12s,border-color .12s;position:relative}
  .dc:hover{transform:translateY(-2px);border-color:var(--blue)}
  .dc:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
  .dc .code{font-family:var(--mono);font-size:12.5px;font-weight:600;letter-spacing:.03em}
  .dc .city{color:var(--faint);font-size:10px;margin-top:2px}
  .dc .bars{display:flex;gap:5px;margin-top:11px}
  .dc .bar{flex:1;border-radius:5px;padding:6px;text-align:center}
  .dc .bar .bl{font-size:8px;text-transform:uppercase;letter-spacing:.09em;opacity:.85}
  .dc .bar .bd{font-family:var(--mono);font-size:10.5px;font-weight:600;margin-top:2px}
  .bar.g{background:var(--green-bg);color:var(--green)}.bar.a{background:var(--amber-bg);color:var(--amber)}.bar.r{background:var(--red-bg);color:var(--red)}
  .dc .worst{position:absolute;top:13px;right:13px;width:8px;height:8px;border-radius:50%}
  .dc .flag{margin-top:9px;font-size:9.5px;font-family:var(--mono);display:flex;align-items:center;gap:4px}
  .flag.shift{color:var(--blue)}.flag.build{color:var(--amber)}.flag.ok{color:var(--faint)}

  /* generic data table */
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  thead th{text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);padding:12px 14px;border-bottom:1px solid var(--line);font-weight:600;white-space:nowrap}
  tbody td{padding:12px 14px;font-size:12.5px;border-bottom:1px solid var(--line)}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#12203c}
  td.mono{font-family:var(--mono);font-size:12px}
  .pill{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9.5px;padding:3px 9px;border-radius:11px;letter-spacing:.03em;white-space:nowrap}
  .pill.r{background:var(--red-bg);color:var(--red)}.pill.a{background:var(--amber-bg);color:var(--amber)}.pill.g{background:var(--green-bg);color:var(--green)}
  .pill.b{background:var(--blue-dim);color:#7fbfff}.pill.n{background:#1c2740;color:var(--mute)}
  .cdot{width:8px;height:8px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:7px}
  .bad{color:var(--red)}.warn{color:var(--amber)}.good{color:var(--green)}

  /* mini progress bar in cells */
  .prog{height:6px;background:var(--line);border-radius:3px;overflow:hidden;min-width:70px;margin-top:5px}
  .prog i{display:block;height:100%;border-radius:3px}

  /* two-col cards for finance/sales */
  .cards2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:18px}
  .card h3{font-size:12px;color:var(--mute);font-weight:600;margin-bottom:14px;letter-spacing:.02em}
  .krow{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--line)}
  .krow:last-child{border-bottom:none}
  .krow .k{color:var(--mute);font-size:12px}
  .krow .val{font-family:var(--mono);font-size:13px}
  .bignum{font-family:var(--mono);font-size:24px;font-weight:600;margin-top:4px}
</style>
</head>
<body>

<div class="app">
  <!-- Left Side Navigation Menu Layout -->
  <div class="side">
    
    <!-- Embedded DigitalOcean Brand Asset Area -->
    <div class="do-logo-container">
      <a href="https://github.io" target="_self">
        <img src="https://wikimedia.org" alt="DigitalOcean Logo">
      </a>
    </div>

    <!-- Capacity Health Context Header -->
    <div class="logo">
      <div class="d3"><i style="background:var(--blue)"></i><i style="background:var(--green)"></i></div>
      <div>
        <h1>Capacity Health</h1>
        <div class="sub">v4.2.1-PROD</div>
      </div>
    </div>

    <!-- Link Context Wrappers -->
    <div class="navgroup">
      <div class="gl">Views</div>
      <div class="nav active">
        <div class="ic">📊</div>
        <span>Fleet Dashboard</span>
      </div>
    </div>
  </div>

  <!-- Right Side Content Main Area Grid -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="tt">Capacity Infrastructure Health</div>
        <div class="td">Fleet view and hypervisor load distribution</div>
      </div>
      <div class="right">
        <div class="kv">
          <div class="l">Status</div>
          <div class="live"><i></i>Operational</div>
        </div>
      </div>
    </div>
    
    <!-- Primary Panel Monitoring Console View -->
